name: Test & Deploy

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

env:
  SUPERADMIN_EMAIL:    ${{ secrets.SUPERADMIN_EMAIL }}
  SUPERADMIN_PASSWORD: ${{ secrets.SUPERADMIN_PASSWORD }}

jobs:
  # ── JOB 1: API TESTS (STAGING) ─────────────────────────────────────────
  api-tests-staging:
    name: API Tests — Staging
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run API tests against staging
        env:
          TEST_BASE_URL: ${{ secrets.TEST_BASE_URL_STAGING || 'https://kaali-complete-git-staging-oohads.vercel.app' }}
        run: npm run test:api

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-results-staging
          path: test-results/
          retention-days: 7

  # ── JOB 2: E2E TESTS (STAGING) ─────────────────────────────────────────
  e2e-tests-staging:
    name: E2E Tests — Staging
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: api-tests-staging

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests against staging
        env:
          TEST_BASE_URL: ${{ secrets.TEST_BASE_URL_STAGING || 'https://kaali-complete-git-staging-oohads.vercel.app' }}
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-staging
          path: playwright-report/
          retention-days: 7

  # ── JOB 3: SMOKE TEST PRODUCTION (main only) ───────────────────────────
  smoke-test-production:
    name: Smoke Test — Production
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [api-tests-staging, e2e-tests-staging]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run API smoke tests against production
        env:
          TEST_BASE_URL: ${{ secrets.TEST_BASE_URL_PROD || 'https://aichat.absoluteapplabs.com' }}
        run: npm run test:api:smoke

      - name: Run E2E smoke tests against production
        env:
          TEST_BASE_URL: ${{ secrets.TEST_BASE_URL_PROD || 'https://aichat.absoluteapplabs.com' }}
        run: npm run test:e2e:smoke

      - name: Upload production smoke test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-report-production
          path: playwright-report/
          retention-days: 14

  # ── NOTIFY ON FAILURE ──────────────────────────────────────────────────
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [api-tests-staging, e2e-tests-staging]
    if: failure()

    steps:
      - name: Log failure
        run: |
          echo "❌ Tests failed on branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Author: ${{ github.actor }}"
